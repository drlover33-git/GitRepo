<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chloe Kim · 김명심</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --warm-white: #FDF9F4;
      --sand: #EDE8DF;
      --warm-tan: #D4C8B4;
      --terracotta: #C2714F;
      --terracotta-light: #E8957A;
      --terracotta-pale: #F9EDE7;
      --deep-brown: #3D2B1F;
      --mid-brown: #6B4F3A;
      --muted: #8C7B6E;
      --font-serif: 'Lora', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--deep-brown);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }
